pid tmp/{{GIN_ENV}}-nginx.pid;

worker_processes auto;

# environment variables passed to Lua workers
env ENABLE_USER_REGISTRATION;
env ADMIN_PASSWORD;

events {
    worker_connections 4096;
}

http {
    sendfile on;

    # Gin initialization
    {{GIN_INIT}}

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # rate limiting: 10 requests/sec per IP with burst allowance
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    client_max_body_size 1m;

    # security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # for http traffic
    server {
        listen 1{{GIN_PORT}};

        keepalive_timeout 70;
        limit_req zone=api burst=20 nodelay;

        # browser-accessible routes: bypass gin's Accept header validation
        # For POST requests, stash form args in ngx.ctx and replace body
        # with empty JSON so gin's JSON parser doesn't choke on form data.
        location /admin {
            content_by_lua_block {
                if ngx.req.get_method() == "POST" then
                    ngx.req.read_body()
                    ngx.ctx.form_args = ngx.req.get_post_args()
                    ngx.req.set_body_data("{}")
                end
                ngx.req.set_header("Accept", "application/vnd.koreader.v1+json")
                require("gin.core.router").handler(ngx)
            }
        }

        location = /healthcheck {
            content_by_lua_block {
                ngx.ctx.original_accept = ngx.var.http_accept
                ngx.req.set_header("Accept", "application/vnd.koreader.v1+json")
                require("gin.core.router").handler(ngx)
            }
        }

        # Gin runtime (catch-all for API routes)
        {{GIN_RUNTIME}}

        access_log /proc/1/fd/1 combined;
        access_log logs/{{GIN_ENV}}-access.log combined buffer=16k;
        error_log /proc/1/fd/2 info;
        error_log logs/{{GIN_ENV}}-error.log info;
    }

    # for https traffic
    server {
        listen {{GIN_PORT}} ssl;

        keepalive_timeout 70;
        limit_req zone=api burst=20 nodelay;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # browser-accessible routes: bypass gin's Accept header validation
        location /admin {
            content_by_lua_block {
                if ngx.req.get_method() == "POST" then
                    ngx.req.read_body()
                    ngx.ctx.form_args = ngx.req.get_post_args()
                    ngx.req.set_body_data("{}")
                end
                ngx.req.set_header("Accept", "application/vnd.koreader.v1+json")
                require("gin.core.router").handler(ngx)
            }
        }

        location = /healthcheck {
            content_by_lua_block {
                ngx.ctx.original_accept = ngx.var.http_accept
                ngx.req.set_header("Accept", "application/vnd.koreader.v1+json")
                require("gin.core.router").handler(ngx)
            }
        }

        # Gin runtime (catch-all for API routes)
        {{GIN_RUNTIME}}

        access_log /proc/1/fd/1 combined;
        access_log logs/{{GIN_ENV}}-access.log combined buffer=16k;
        error_log /proc/1/fd/2 info;
        error_log logs/{{GIN_ENV}}-error.log info;
    }
}
