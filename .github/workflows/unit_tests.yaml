name: Busted test suite

on:
  pull_request:
    branches:
        - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build -f Dockerfile -t app:test .

      - name: Run busted test suite
        run: |
          docker run --rm app:test /app/koreader-sync-server/scripts/run_tests.sh
