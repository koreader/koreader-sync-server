name: Busted test suite

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract container metadata
        id: meta
        if: github.event_name == 'push' && github.repository == 'koreader/koreader-sync-server'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kosync
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            koreader/kosync:test
            koreader/kosync:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run busted test suite
        run: make test VERSION=test

      - name: Verify production healthcheck
        run: |
          docker run -d --name kosync-test koreader/kosync:test
          sleep 5
          docker exec kosync-test /app/koreader-sync-server/scripts/healthcheck.sh

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.repository == 'koreader/koreader-sync-server'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push GHCR image
        if: github.event_name == 'push' && github.repository == 'koreader/koreader-sync-server'
        run: |
          while IFS= read -r tag; do
            docker tag koreader/kosync:test "$tag"
            docker push "$tag"
          done <<'EOF'
          ${{ steps.meta.outputs.tags }}
          EOF
