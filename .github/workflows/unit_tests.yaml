name: Busted test suite

on:
  pull_request:
    branches:
        - "**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build -f Dockerfile -t app:test .

      - name: Run busted test suite
        run: |
          docker run --rm app:test /app/koreader-sync-server/scripts/run_tests.sh

      - name: Verify production healthcheck
        run: |
          docker run -d --name kosync-test app:test
          sleep 5
          response=$(docker exec kosync-test wget -qO- --no-check-certificate --header="Accept: application/vnd.koreader.v1+json" https://127.0.0.1:7200/healthcheck)
          docker stop kosync-test
          echo "$response"
          echo "$response" | grep -q '"state":"OK"'
